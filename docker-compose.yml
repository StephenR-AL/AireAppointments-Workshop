services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aireappointments
      POSTGRES_USER: aireappointments
      POSTGRES_PASSWORD: aireappointments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aireappointments"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/AireAppointments.Api
    ports:
      - "5000:5000"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=aireappointments;Username=aireappointments;Password=aireappointments;"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
