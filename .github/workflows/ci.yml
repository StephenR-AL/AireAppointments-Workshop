name: CI

on:
  push:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/**"
      - ".editorconfig"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/**"
      - ".editorconfig"

jobs:
  backend:
    name: Backend
    if: |
      github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore AireAppointments.Api.sln

      - name: Check formatting
        run: dotnet format AireAppointments.Api.sln --verify-no-changes

      - name: Build
        run: dotnet build AireAppointments.Api.sln --no-restore

      - name: Test
        run: dotnet test AireAppointments.Api.sln --no-build

  frontend:
    name: Frontend
    if: |
      github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
